<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Professional briefcase icon for resume portfolio -->
  
  <!-- Briefcase body -->
  <rect x="20" y="35" width="60" height="45" rx="4" fill="none" stroke="#2c3e50" stroke-width="2.5"/>
  
  <!-- Briefcase handle -->
  <path d="M 35 35 Q 50 15 65 35" fill="none" stroke="#2c3e50" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Center latch/divider -->
  <line x1="50" y1="35" x2="50" y2="80" stroke="#2c3e50" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Side details (pockets) -->
  <rect x="25" y="45" width="18" height="25" rx="2" fill="none" stroke="#2c3e50" stroke-width="1.5" opacity="0.6"/>
  <rect x="57" y="45" width="18" height="25" rx="2" fill="none" stroke="#2c3e50" stroke-width="1.5" opacity="0.6"/>
</svg>
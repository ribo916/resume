<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rich Boesch — Resume PDF</title>
<style>
  :root {
    --bg: #0f1117;
    --text: #e8eaf0;
    --text2: #9aa3b8;
    --accent: #6c8fff;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; align-items: center; justify-content: center; }
  .card {
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 52px 64px;
    max-width: 420px;
  }
  .icon { font-size: 48px; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
  p { font-size: 15px; color: var(--text2); line-height: 1.6; margin-bottom: 28px; }
  a {
    display: inline-block;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: background 0.2s, color 0.2s;
  }
  a:hover { background: var(--accent); color: #0f1117; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📄</div>
    <h1>PDF Resume</h1>
    <p>Coming soon. In the meantime, explore an interactive version of the resume.</p>
    <a href="../">Back to home</a>
  </div>
</body>
</html>

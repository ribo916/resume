<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rich Boesch — Resume PDF</title>
<style>
  :root {
    --bg: #03050f;
    --text: #e8eaf0;
    --text2: #9aa3b8;
    --accent: #6c8fff;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .card {
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 44px 48px;
    max-width: 420px;
    width: 100%;
  }
  .icon { font-size: 44px; margin-bottom: 18px; }
  h1 { font-size: clamp(18px, 5vw, 22px); font-weight: 600; margin-bottom: 10px; }
  p { font-size: 15px; color: var(--text2); line-height: 1.6; margin-bottom: 28px; }
  a {
    display: inline-block;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: background 0.2s, color 0.2s;
  }
  a:hover { background: var(--accent); color: var(--bg); }

  @media (max-width: 480px) {
    .card { padding: 36px 28px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📄</div>
    <h1>PDF Resume</h1>
    <p>Coming soon. In the meantime, explore an interactive version of the resume.</p>
    <a href="../">Back to home</a>
  </div>
</body>
</html>
